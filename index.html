// ── Theme ──
function initTheme() {
  const saved = localStorage.getItem('ppt_theme') || 'light';
  applyTheme(saved);
}
function applyTheme(theme) {
  document.body.classList.toggle('dark', theme === 'dark');
  localStorage.setItem('ppt_theme', theme);
  const icon = theme === 'dark' ? '☀️' : '🌙';
  const btn = $('theme-btn'); if (btn) btn.textContent = icon;
  const lbtn = $('login-theme-btn'); if (lbtn) lbtn.textContent = icon;
}
function toggleTheme() {
  const isDark = document.body.classList.contains('dark');
  applyTheme(isDark ? 'light' : 'dark');
}

// ── Gemini AI 分析 ──
const WORKER_URL = 'https://poopoo-analyzer.jacksonexhuang.workers.dev';

async function analyzeWithGemini(photoBase64) {
  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: photoBase64 })
    });
    if (!res.ok) throw new Error('Worker 回應錯誤 ' + res.status);
    const data = await res.json();
    // Ensure tags are present
    if (!data.ai_tags || !data.health_score) throw new Error('回應格式錯誤');
    return data;
  } catch(e) {
    console.error('Gemini 分析失敗:', e);
    // Fallback
    return { ai_tags: ['#分析失敗','#請重試'], health_score: 5, summary: '無法連線到 AI' };
  }
}

// ── Auth ──
onAuthStateChanged(auth, async user => {

    currentUser = user;

    if (groupId) {

  }
});

// ── Group logic ──
async function getUserGroup(uid) {
  // Check userProfiles collection for group membership
  try {
    const snap = await getDoc(doc(db, 'userProfiles', uid));
    if (snap.exists() && snap.data().groupId) return snap.data().groupId;
  } catch(e) {}
  return null;
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

// Create new group
$('create-group-btn').addEventListener('click', async () => {
  const btn = $('create-group-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  $('group-error').classList.add('hidden');
  try {
    const code = generateCode();
    const groupRef = doc(db, 'groups', code);
    await setDoc(groupRef, {
      code,
      owner: currentUser.uid,
      members: [currentUser.uid],
      created_at: Timestamp.now(),
    });
    // Save group to user profile
    await setDoc(doc(db, 'userProfiles', currentUser.uid), {
      groupId: code,
      displayName: currentUser.displayName,
    });
    currentGroupId = code;
    showApp();
    showInviteCode(code);
  } catch(e) {
    $('group-error').textContent = '建立失敗：' + e.message;
    $('group-error').classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = '建立新群組';
  }
});

// Join existing group
$('join-group-btn').addEventListener('click', async () => {
  const code = $('inp-invite-code').value.trim().toUpperCase();
  if (!code) { showGroupErr('請輸入邀請碼'); return; }
  const btn = $('join-group-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>';
  $('group-error').classList.add('hidden');
  try {
    const groupRef = doc(db, 'groups', code);
    const groupSnap = await getDoc(groupRef);
    if (!groupSnap.exists()) { showGroupErr('找不到此邀請碼，請確認再試'); btn.disabled=false; btn.textContent='加入群組'; return; }
    // Add user to group members
    const members = groupSnap.data().members || [];
    if (!members.includes(currentUser.uid)) {
      await setDoc(groupRef, { ...groupSnap.data(), members: [...members, currentUser.uid] });
    }
    await setDoc(doc(db, 'userProfiles', currentUser.uid), {
      groupId: code,
      displayName: currentUser.displayName,
    });
    currentGroupId = code;
    showApp();
  } catch(e) {
    showGroupErr('加入失敗：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '加入群組';
  }
});

function showGroupErr(msg) {

  $('group-error').classList.remove('hidden');
}

// ── Times ──
function setDefaultTimes() {
  const now = new Date(), start = new Date(now - 30*60000);
  $('inp-start').value = toHHMM(start);
  $('inp-end').value   = toHHMM(now);
  updateDur();
}
function toHHMM(d) { return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function updateDur() {
  const s=$('inp-start').value, e=$('inp-end').value;
  if (!s||!e) { $('dur-display').classList.add('hidden'); return; }
  const [sh,sm]=s.split(':').map(Number), [eh,em]=e.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if (mins<=0) { $('dur-display').classList.add('hidden'); return; }
  $('dur-text').textContent = mins>=60?`${Math.floor(mins/60)} 小時 ${mins%60} 分鐘`:`${mins} 分鐘`;
  $('dur-display').classList.remove('hidden');
}
$('inp-start').addEventListener('change', updateDur);
$('inp-end').addEventListener('change',   updateDur);

// ── Grayscale ──
function fileToGrayscaleBase64(file) {
  return new Promise(resolve => {
    const img = new Image(), url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = Math.min(img.width, 800);
      canvas.height = Math.round(img.height * (canvas.width / img.width));
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const d = ctx.getImageData(0,0,canvas.width,canvas.height);
      for (let i=0;i<d.data.length;i+=4) {
        const g = d.data[i]*.299+d.data[i+1]*.587+d.data[i+2]*.114;
        d.data[i]=d.data[i+1]=d.data[i+2]=g;
      }
      ctx.putImageData(d,0,0);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.75));
    };
    img.src = url;
  });
}

// ── Submit ──
$('submit-btn').addEventListener('click', submitWalk);
async function submitWalk() {
  if (!currentUser || !currentGroupId) return;
  const startT  = $('inp-start').value;
  const endT    = $('inp-end').value;
  const notes   = $('walk-notes').value.trim();
  const petName = $('inp-petname').value.trim() || '豆豆';
  $('form-err').classList.add('hidden');
  if (!startT)    { showFormErr('請填寫開始時間'); return; }
  if (!photoFile) { showFormErr('請上傳糞便照片'); return; }
  if (!notes)     { showFormErr('請填寫備註'); return; }

  let durSec = 0;
  if (endT) {
    const [sh,sm]=startT.split(':').map(Number), [eh,em]=endT.split(':').map(Number);
    let mins=(eh*60+em)-(sh*60+sm); if(mins<0) mins+=24*60;
    durSec = mins*60;
  }
  const today=new Date().toISOString().slice(0,10);
  const btn=$('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span> Gemini 分析中...';
  $('ai-result').classList.add('hidden');
  try {
    const photoBase64 = await fileToGrayscaleBase64(photoFile);
    await new Promise(r=>setTimeout(r,900));
    const {ai_tags,health_score} = mockAnalyze();
    // Store under group, not user
    await addDoc(collection(db,'groups',currentGroupId,'walks'), {
      uid:          currentUser.uid,
      userName:     currentUser.displayName || '成員',
      pet_name:     petName,
      start_time:   `${today}T${startT}:00`,
      end_time:     endT ? `${today}T${endT}:00` : null,
      duration:     durSec,
      photo_base64: photoBase64,
      ai_tags, health_score,
      summary: summary || '',
      notes,
      created_at:   Timestamp.now(),
    });
    $('ai-result').classList.add('hidden');
    showAIResult({ai_tags,health_score});
    $('walk-notes').value='';
    $('inp-petname').value='豆豆';
    $('clear-photo-btn').click();
    setDefaultTimes();
  } catch(e) { alert('打卡失敗：'+e.message); }
  finally { btn.disabled=false; btn.textContent='完成打卡 ✓'; }
}

function showFormErr(msg) { $('form-err').textContent='⚠️ '+msg; $('form-err').classList.remove('hidden'); }

function showAIResult({ai_tags,health_score}) {
  const circ=144.5, arc=$('score-arc');
  arc.setAttribute('stroke-dasharray',`${(health_score/10)*circ} ${circ}`);
  const color=health_score>=7?'#22C55E':health_score>=4?'#F59E0B':'#EF4444';
  const tc=health_score>=7?'#4ade80':health_score>=4?'#fb923c':'#f87171';
  arc.setAttribute('stroke',color);
  $('score-num').textContent=health_score; $('score-num').style.color=tc;
  $('score-label').textContent=health_score>=7?'👍 良好':health_score>=4?'⚠️ 注意':'🚨 警告';
  const sumEl=$('ai-summary');
  if(sumEl){ sumEl.textContent=summary||''; sumEl.style.display=summary?'block':'none'; }
  const tagRow=$('ai-tags'); tagRow.innerHTML='';
  ['badge-green','badge-purple','badge-amber'].forEach((cls,i)=>{
    if(!ai_tags[i]) return;
    const s=document.createElement('span');
    s.className=`badge ${cls}`; s.style.animationDelay=`${i*.1}s`;
    s.textContent=ai_tags[i]; tagRow.appendChild(s);
  });
  $('ai-result').classList.remove('hidden');
}

// ── Records ──
$('refresh-btn').addEventListener('click', loadRecords);
async function loadRecords() {
  if (!currentGroupId) return;
  $('records-list').innerHTML='<div style="display:flex;justify-content:center;padding:48px"><span class="spin" style="width:32px;height:32px;border-width:3px"></span></div>';
  try {
    const q=query(collection(db,'groups',currentGroupId,'walks'),orderBy('created_at','desc'));
    const snap=await getDocs(q);
    renderRecords(snap.docs.map(d=>({id:d.id,...d.data()})));
  } catch(e) {
    $('records-list').innerHTML=`<div class="empty"><div class="empty-emoji">😵</div><div>${e.message}</div></div>`;
  }
}

function renderRecords(recs) {
  if (!recs.length) {
    $('records-list').innerHTML='<div class="empty"><div class="empty-emoji">🐕</div><p style="font-size:16px;margin-bottom:6px">還沒有任何紀錄</p><p style="font-size:13px">去打卡頁面記錄第一次遛狗！</p></div>';
    return;
  }
  $('records-list').innerHTML=recs.map((r,i)=>{
    const thumb=r.photo_base64
      ?`<img class="rec-thumb" src="${r.photo_base64}" alt="" onclick="openLightbox('${r.photo_base64}')">`
      :`<div class="rec-placeholder">🐾</div>`;
    const sc=r.health_score;
    const tc=sc>=7?'#4ade80':sc>=4?'#fb923c':'#f87171';
    const bc=sc>=7?'var(--green)':sc>=4?'#f59e0b':'#ef4444';
    const tags=(r.ai_tags||[]).map(t=>`<span class="badge badge-purple" style="font-size:11px">${t}</span>`).join('');
    const timeStr=fmtTimeRange(r.start_time,r.end_time);
    const durStr=r.duration?fmtDur(r.duration):'—';
    const note=r.notes?` · ${r.notes.slice(0,28)}${r.notes.length>28?'…':''}`:'';
    const petName=r.pet_name||'豆豆';
    const poster=r.userName?`<span class="member-tag">${r.userName}</span>`:'';
    const canDelete=r.uid===currentUser?.uid;
    return `<div class="rec-card" style="animation-delay:${i*.05}s">
      ${thumb}
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div>
            <div style="font-weight:600;font-size:15px">${petName} · ${timeStr}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">⏱ ${durStr}${note}</div>
            <div style="margin-top:4px">${poster}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <span style="font-size:18px;font-weight:800;color:${tc}">${sc}</span>
            ${canDelete?`<button class="btn-danger" onclick="deleteRecord('${r.id}')">刪除</button>`:''}
          </div>
        </div>
        <div class="hbar"><div class="hbar-fill" style="width:${sc*10}%;background:${bc}"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:7px">${tags}</div>
      </div>
    </div>`;
  }).join('');
}

window.deleteRecord = async function(id) {
  if (!confirm('確定刪除這筆紀錄？')) return;
  try {
    await deleteDoc(doc(db,'groups',currentGroupId,'walks',id));
    loadRecords();
  } catch(e) { alert('刪除失敗：'+e.message); }
};

// ── Stats ──
async function loadStats() {
  if (!currentGroupId) return;
  $('stats-content').innerHTML='<div style="display:flex;justify-content:center;padding:48px"><span class="spin" style="width:32px;height:32px;border-width:3px"></span></div>';
  try {
    const snap=await getDocs(collection(db,'groups',currentGroupId,'walks'));
    const recs=snap.docs.map(d=>d.data());
    const total=recs.length;
    const avgH=total?+(recs.reduce((a,r)=>a+r.health_score,0)/total).toFixed(1):null;
    const totalDur=recs.reduce((a,r)=>a+(r.duration||0),0);
    const last=recs.sort((a,b)=>b.created_at?.seconds-a.created_at?.seconds)[0]?.created_at;
    const hc=(avgH||0)>=7?'#4ade80':(avgH||0)>=4?'#fb923c':'var(--purple)';
    const lastStr=last?fmtDate(new Date(last.seconds*1000)):null;
    // Member breakdown
    const byMember={};
    recs.forEach(r=>{ byMember[r.userName||'未知']=(byMember[r.userName||'未知']||0)+1; });
    const memberRows=Object.entries(byMember).map(([name,count])=>
      `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span>${name}</span><span style="color:var(--purple);font-weight:700">${count} 次</span>
      </div>`).join('');
    $('stats-content').innerHTML=`
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val" style="color:var(--purple)">${total}</div><div class="stat-lbl">🐕 群組總次數</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${hc}">${avgH||'—'}</div><div class="stat-lbl">❤️ 平均健康分數</div></div>
        <div class="stat-card" style="grid-column:1/-1"><div class="stat-val" style="color:#60a5fa">${fmtDur(totalDur)}</div><div class="stat-lbl">⏱ 總遛狗時長</div></div>
      </div>
      ${memberRows?`<div class="card" style="padding:18px;margin-bottom:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">👥 成員打卡次數</div>${memberRows}</div>`:''}
      ${lastStr?`<div class="card" style="padding:18px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">最後一次遛狗</div><div style="font-weight:700">${lastStr}</div></div>`:''}
      ${!total?'<div class="empty"><div class="empty-emoji">📈</div><p>開始打卡後，統計就會出現在這裡</p></div>':''}`;
  } catch(e) { $('stats-content').innerHTML=`<div class="empty">${e.message}</div>`; }
}

// ── Helpers ──
function fmtTimeRange(start,end) {
  if (!start) return '—';
  const t=iso=>iso.slice(11,16), date=start.slice(5,10).replace('-','/');
  return end?`${date} ${t(start)} — ${t(end)}`:`${date} ${t(start)}`;
}
function fmtDur(sec) {
  if (!sec) return '—';
  const m=Math.floor(sec/60);
  return m>=60?`${Math.floor(m/60)} 小時 ${m%60} 分`:`${m} 分鐘`;
}
function fmtDate(d) {
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
</script>
